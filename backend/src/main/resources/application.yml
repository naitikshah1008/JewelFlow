spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jewelflow
    username: jewelflow_user
    password: jewelflow_pass

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

jewelflow:
  security:
    jwt:
      secret: ${JWT_SECRET:local-demo-secret-change-before-production-123456}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
    refresh-token:
      expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:14}
    user-invite:
      expiration-days: ${JEWELFLOW_USER_INVITE_EXPIRATION_DAYS:7}
    bootstrap-admin:
      username: ${JEWELFLOW_ADMIN_USERNAME:admin}
      password: ${JEWELFLOW_ADMIN_PASSWORD:AdminDemo123!}
    bootstrap-staff:
      username: ${JEWELFLOW_STAFF_USERNAME:staff}
      password: ${JEWELFLOW_STAFF_PASSWORD:StaffDemo123!}
    cors:
      allowed-origin: ${JEWELFLOW_CORS_ALLOWED_ORIGIN:http://localhost:5173}
